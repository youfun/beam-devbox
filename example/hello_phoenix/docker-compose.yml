version: '3.8'

# HelloPhoenix Example - Using beam-devbox for local development
#
# This compose file demonstrates how to use beam-devbox for development.
# The infrastructure (PostgreSQL + MinIO) runs in one container, while you
# develop the Phoenix app locally with hot reloading.

services:
  # Base infrastructure from beam-devbox image
  # This gives you PostgreSQL + MinIO in a single container
  infra:
    image: ghcr.io/youfun/beam-devbox:otp28
    container_name: phoenix-infra
    ports:
      - "5432:5432"      # PostgreSQL
      - "9000:9000"      # MinIO API
      - "9001:9001"      # MinIO Console
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hello_phoenix_dev
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: uploads
    volumes:
      - pgdata:/var/lib/postgresql/data
      - miniodata:/var/lib/minio/data
    healthcheck:
      test: ["CMD", "sh", "-c", "pg_isready -U postgres -d hello_phoenix_dev \&\& wget -qO- http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phoenix-net

  # Optional: Run Phoenix inside beam-devbox container
  # Uncomment this if you want to develop inside the container instead of locally
  #
  # app:
  #   image: ghcr.io/youfun/beam-devbox:otp28
  #   container_name: phoenix-app
  #   command: >
  #     bash -c "
  #       cd /app &&
  #       mix local.hex --force &&
  #       mix local.rebar --force &&
  #       mix deps.get &&
  #       mix ecto.setup &&
  #       mix phx.server
  #     "
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     MIX_ENV: dev
  #     PORT: 4000
  #     POSTGRES_HOST: infra
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: hello_phoenix_dev
  #     MINIO_HOST: infra
  #     MINIO_PORT: "9000"
  #     MINIO_BUCKET: uploads
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - .:/app
  #     - elixir-deps:/app/deps
  #     - elixir-build:/app/_build
  #   working_dir: /app
  #   depends_on:
  #     infra:
  #       condition: service_healthy
  #   networks:
  #     - phoenix-net

volumes:
  pgdata:
  miniodata:
  # elixir-deps:
  # elixir-build:

networks:
  phoenix-net:
    driver: bridge
