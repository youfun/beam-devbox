# GitHub Actions Workflow: Build and Push Docker Images
# =============================================================================
# This workflow automatically builds and pushes multi-architecture Docker images
# to GitHub Container Registry (GHCR).
#
# Target Registry:
#   - GitHub Container Registry: ghcr.io/<owner>/beam-devbox:<tag>
#
# Triggers:
#   - Push to main branch
#   - Push tags starting with 'v' (e.g., v1.0.0)
#   - Pull requests to main (build only, no push)
#   - Monthly scheduled rebuild (for security updates)
#
# Required Permissions:
#   - packages: write (for pushing to GHCR)
#   - No additional secrets needed (uses GITHUB_TOKEN automatically)
#
# Architecture Support:
#   - linux/amd64: ubuntu-latest (x86_64)
#   - linux/arm64: ubuntu-24.04-arm (ARM64, native runner)
#
# Usage after first push:
#   docker pull ghcr.io/<your-github-username>/beam-devbox:otp28
#
# Example:
#   docker run -p 5432:5432 -p 9000:9000 ghcr.io/youfun/beam-devbox:otp28
# =============================================================================

name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  schedule:
    # Rebuild monthly to get security updates
    - cron: '0 0 1 * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/beam-devbox

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build matrix: platform + runner + versions
          # OTP 28 + PostgreSQL 18 (latest)
          - runner: ubuntu-latest
            platform: linux/amd64
            otp_version: "28.0"
            elixir_version: "1.19.0"
            postgres_version: "18"
            tags: |
              type=raw,value=otp28-pg18-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            otp_version: "28.0"
            elixir_version: "1.19.0"
            postgres_version: "18"
            tags: |
              type=raw,value=otp28-pg18-arm64

          # OTP 28 + PostgreSQL 17 (stable)
          - runner: ubuntu-latest
            platform: linux/amd64
            otp_version: "28.0"
            elixir_version: "1.19.0"
            postgres_version: "17"
            tags: |
              type=raw,value=otp28-amd64
              type=raw,value=otp28-pg17-amd64
              type=raw,value=latest-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            otp_version: "28.0"
            elixir_version: "1.19.0"
            postgres_version: "17"
            tags: |
              type=raw,value=otp28-arm64
              type=raw,value=otp28-pg17-arm64
              type=raw,value=latest-arm64

          # OTP 27 + PostgreSQL 18
          - runner: ubuntu-latest
            platform: linux/amd64
            otp_version: "27.2"
            elixir_version: "1.18.0"
            postgres_version: "18"
            tags: |
              type=raw,value=otp27-pg18-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            otp_version: "27.2"
            elixir_version: "1.18.0"
            postgres_version: "18"
            tags: |
              type=raw,value=otp27-pg18-arm64

          # OTP 27 + PostgreSQL 17 (LTS)
          - runner: ubuntu-latest
            platform: linux/amd64
            otp_version: "27.2"
            elixir_version: "1.18.0"
            postgres_version: "17"
            tags: |
              type=raw,value=otp27-amd64
              type=raw,value=otp27-pg17-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            otp_version: "27.2"
            elixir_version: "1.18.0"
            postgres_version: "17"
            tags: |
              type=raw,value=otp27-arm64
              type=raw,value=otp27-pg17-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (with retry)
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry-action@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ matrix.tags }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false  # Temporarily disable push for testing
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            OTP_VERSION=${{ matrix.otp_version }}
            ELIXIR_VERSION=${{ matrix.elixir_version }}
            POSTGRES_VERSION=${{ matrix.postgres_version }}

  # Create multi-arch manifests (combine amd64 + arm64)
  manifest:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          # Install crane for manifest manipulation
          curl -fsSL https://github.com/google/go-containerregistry/releases/download/v0.19.1/go-containerregistry_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin crane

          # Define image name
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Create manifests for each tag
          for tag in otp28 otp28-pg17 otp28-pg18 otp27 otp27-pg17 otp27-pg18 latest; do
            echo "Creating manifest for ${IMAGE}:${tag}..."
            crane index append \
              -t "${IMAGE}:${tag}" \
              --platform linux/amd64 "${IMAGE}:${tag}-amd64" \
              --platform linux/arm64 "${IMAGE}:${tag}-arm64" || echo "Skipping ${tag} (may not exist)"
          done

  test:
    runs-on: ubuntu-latest
    needs: manifest
    if: github.event_name != 'pull_request'
    steps:
      - name: Test Docker image
        run: |
          # Start the container
          docker run -d --name test-beam-devbox \
            -p 5432:5432 \
            -p 9000:9000 \
            -p 9001:9001 \
            ghcr.io/${{ github.repository_owner }}/beam-devbox:otp28

          # Wait for services to be ready
          echo "Waiting for services to start..."
          sleep 30

          # Test PostgreSQL
          echo "Testing PostgreSQL..."
          docker exec test-beam-devbox pg_isready -U postgres -d app_dev

          # Test MinIO health
          echo "Testing MinIO..."
          curl -f http://localhost:9000/minio/health/live || exit 1

          echo "All tests passed!"

          # Cleanup
          docker stop test-beam-devbox
          docker rm test-beam-devbox
